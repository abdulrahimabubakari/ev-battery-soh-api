name: CI Pipeline

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy scipy scikit-learn xgboost lightgbm mlflow fastapi uvicorn[standard] httpx pytest pytest-cov python-dotenv pydantic pyarrow python-multipart

    - name: Run tests with coverage
      run: |
        pytest tests/test_api.py -v --cov=api --cov-report=term-missing

    - name: Check coverage threshold
      run: |
        pytest tests/test_api.py --cov=api --cov-fail-under=70